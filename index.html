<style>
  :root {
    --navy: #1a1a2e;
    --navy-mid: #16213e;
    --accent: #4f8ef7;
    --accent-light: #dbeafe;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --border: rgba(0,0,0,0.10);
    --text: #1c1c1e;
    --text2: #6c6c70;
    --text3: #aeaeb2;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --text2: #aeaeb2;
      --text3: #636366;
      --accent-light: #1e3a5f;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); }

  /* App shell */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; background: var(--bg); overflow: hidden; }

  /* Header */
  .header { background: var(--navy); padding-top: var(--safe-top); flex-shrink: 0; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 6px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .status-icons { display: flex; align-items: center; gap: 5px; font-size: 13px; }
  .header-main { padding: 4px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .header-main h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 18px; }
  .header-actions button { background: none; border: none; color: rgba(255,255,255,0.85); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; }
  .account-badge { margin: 6px 20px 0; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; }
  .account-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .account-badge span { font-size: 12px; color: rgba(255,255,255,0.75); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 16px 16px; background: var(--navy); }
  .stat { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 10px; text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }
  .stat .num.blue { color: #60a5fa; }
  .stat .num.green { color: var(--success); }
  .stat .lbl { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; }

  /* Search */
  .search-wrap { padding: 10px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .search-inner { background: var(--surface2); border-radius: 12px; padding: 9px 14px; display: flex; align-items: center; gap: 8px; }
  .search-inner i { font-size: 16px; color: var(--text3); }
  .search-inner input { flex: 1; border: none; background: transparent; font-size: 16px; color: var(--text); outline: none; }
  .search-inner input::placeholder { color: var(--text3); }

  /* Filters */
  .filters { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all 0.15s; }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* Section label */
  .section-lbl { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text2); background: var(--surface2); border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }

  /* Email list */
  .email-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--surface); }

  /* Email item */
  .email-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; background: var(--surface); position: relative; }
  .email-item:active { background: var(--surface2); }
  .email-item.read { background: var(--surface2); }
  .email-item.unread { background: var(--surface); }

  /* Swipe hint strip */
  .email-item.unread::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }

  /* Avatar */
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .av-blue   { background: #dbeafe; color: #1e40af; }
  .av-green  { background: #d1fae5; color: #065f46; }
  .av-amber  { background: #fef3c7; color: #92400e; }
  .av-purple { background: #ede9fe; color: #5b21b6; }
  .av-coral  { background: #fee2e2; color: #991b1b; }
  .av-teal   { background: #ccfbf1; color: #115e59; }
  @media (prefers-color-scheme: dark) {
    .av-blue   { background: #1e3a5f; color: #93c5fd; }
    .av-green  { background: #064e3b; color: #6ee7b7; }
    .av-amber  { background: #451a03; color: #fcd34d; }
    .av-purple { background: #3b0764; color: #c4b5fd; }
    .av-coral  { background: #450a0a; color: #fca5a5; }
    .av-teal   { background: #042f2e; color: #5eead4; }
  }

  /* Email content */
  .email-content { flex: 1; min-width: 0; }
  .email-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .sender-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px; }
  .email-item.read .sender-name { font-weight: 400; color: var(--text2); }
  .email-time { font-size: 12px; color: var(--text3); flex-shrink: 0; padding-left: 8px; }
  .email-subject { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .email-item.read .email-subject { font-weight: 400; color: var(--text2); }
  .email-preview { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-footer { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .unread-pill { background: var(--accent); color: white; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
  .attach-badge { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); }
  .attach-badge i { font-size: 13px; }

  /* Empty state */
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text3); }
  .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Bottom nav */
  .bottom-nav { background: var(--surface); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: max(10px, var(--safe-bottom)); flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 16px; position: relative; }
  .nav-item i { font-size: 24px; color: var(--text3); }
  .nav-item.active i { color: var(--navy); }
  .nav-item .nav-label { font-size: 10px; color: var(--text3); font-weight: 500; }
  .nav-item.active .nav-label { color: var(--navy); }
  .nav-badge { position: absolute; top: -2px; right: 8px; background: var(--danger); color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--surface); }

  /* FAB */
  .fab { position: fixed; bottom: calc(80px + var(--safe-bottom)); right: 20px; width: 56px; height: 56px; background: var(--navy); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(26,26,46,0.35); z-index: 10; }
  .fab i { font-size: 24px; color: white; }

  /* Detail view */
  .detail-view { position: fixed; inset: 0; background: var(--surface); z-index: 100; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
  .detail-view.open { transform: translateX(0); }
  .detail-header { background: var(--navy); padding-top: var(--safe-top); padding-bottom: 12px; flex-shrink: 0; }
  .detail-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; }
  .detail-nav button { background: none; border: none; color: rgba(255,255,255,0.85); font-size: 22px; cursor: pointer; padding: 6px; display: flex; align-items: center; gap: 6px; }
  .detail-nav .back-btn { font-size: 16px; color: rgba(255,255,255,0.9); }
  .detail-nav .back-btn i { font-size: 20px; }
  .detail-subject { padding: 10px 16px 0; font-size: 17px; font-weight: 600; color: #fff; line-height: 1.3; }
  .detail-meta { padding: 8px 16px; font-size: 13px; color: rgba(255,255,255,0.6); display: flex; justify-content: space-between; }
  .detail-body { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .detail-sender-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface2); border-radius: 14px; margin-bottom: 16px; }
  .detail-sender-info { flex: 1; }
  .detail-sender-info .name { font-size: 15px; font-weight: 600; color: var(--text); }
  .detail-sender-info .email-addr { font-size: 13px; color: var(--text2); }
  .detail-text { font-size: 15px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }
  .detail-actions { display: flex; gap: 10px; padding: 12px 16px; border-top: 0.5px solid var(--border); background: var(--surface); padding-bottom: max(12px, var(--safe-bottom)); flex-shrink: 0; }
  .action-btn { flex: 1; padding: 13px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface2); font-size: 15px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .action-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
  .attach-list { margin-top: 16px; }
  .attach-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--surface2); border-radius: 12px; margin-bottom: 8px; }
  .attach-item i { font-size: 22px; color: var(--accent); }
  .attach-item span { font-size: 14px; color: var(--text); }

  @media (prefers-color-scheme: dark) {
    .nav-item.active i { color: #60a5fa; }
    .nav-item.active .nav-label { color: #60a5fa; }
    .filter-btn.active { background: #2d4a7a; border-color: #4f8ef7; color: #93c5fd; }
    .fab { background: #2d4a7a; }
  }
</style>

<div class="app">

      </div>

    <div class="account-badge">

      <span>somkhuanv@aeonlao.com.la</span>

  <!-- Stats -->
  <div class="stats">

      <div class="num blue" id="stat-unread">18</div>

    </div>

      <div class="lbl">Total</div>
    </div>
    <div class="stat">

      <div class="lbl">Attachments</div>

  <!-- Search -->
  <div class="search-wrap" id="search-wrap" style="display:none;">

      <i class="ti ti-search"></i>

    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>

  <!-- Section label -->
  <div class="section-lbl" id="section-lbl">Today · 17 June 2026</div>

  <!-- Email list -->
  <div class="email-list" id="email-list"></div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div style="position:relative">
        <i class="ti ti-inbox"></i>
        <span class="nav-badge" id="nav-badge">18</span>
      </div>
      <span class="nav-label">Inbox</span>
    </div>
    <div class="nav-item" onclick="alert('Sent folder — connect your Outlook account to load more folders.')">
      <i class="ti ti-send"></i>
      <span class="nav-label">Sent</span>
    </div>
    <div class="nav-item" onclick="alert('Drafts — coming soon.')">
      <i class="ti ti-file-text"></i>
      <span class="nav-label">Drafts</span>
    </div>
    <div class="nav-item" onclick="alert('Calendar — open Outlook for calendar view.')">
      <i class="ti ti-calendar"></i>
      <span class="nav-label">Calendar</span>
    </div>
    <div class="nav-item" onclick="showProfile()">
      <i class="ti ti-user-circle"></i>
      <span class="nav-label">Profile</span>
    </div>
  </div>
</div>

<!-- FAB Compose -->
<button class="fab" aria-label="Compose" onclick="alert('Compose — open Outlook app to send new email.')">
  <i class="ti ti-edit"></i>
</button>

<!-- Detail view -->
<div class="detail-view" id="detail-view">
  <div class="detail-header">
    <div class="detail-nav">
      <button class="back-btn" onclick="closeDetail()"><i class="ti ti-chevron-left"></i> Inbox</button>
      <div style="display:flex;gap:4px;">
        <button aria-label="Archive"><i class="ti ti-archive"></i></button>
        <button aria-label="Delete"><i class="ti ti-trash"></i></button>
        <button aria-label="More"><i class="ti ti-dots"></i></button>
      </div>
    </div>
    <div class="detail-subject" id="detail-subject">Subject</div>
    <div class="detail-meta">
      <span id="detail-date">Jun 17, 2026</span>
      <span id="detail-attach-info"></span>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="detail-actions">
    <button class="action-btn" onclick="replyEmail()"><i class="ti ti-arrow-back-up"></i> Reply</button>
    <button class="action-btn" onclick="forwardEmail()"><i class="ti ti-arrow-forward-up"></i> Forward</button>
    <button class="action-btn primary" onclick="openOutlook()"><i class="ti ti-external-link"></i> Open</button>
  </div>
</div>

const todayTimes = ["9:50 AM","9:35 AM","9:08 AM","7:55 AM","7:50 AM","6:26 AM","4:53 AM","4:40 AM","4:20 AM"];
let currentFilter = 'all';
let currentEmail = null;

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 30000);

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function toggleSearch() {
  const wrap = document.getElementById('search-wrap');
  const visible = wrap.style.display !== 'none';
  wrap.style.display = visible ? 'none' : 'block';
  if (!visible) document.getElementById('search-input').focus();
  else { document.getElementById('search-input').value = ''; renderList(); }
}

function getFiltered() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  return emails.filter(e => {
    if (q && !e.sender.toLowerCase().includes(q) && !e.subject.toLowerCase().includes(q) && !e.preview.toLowerCase().includes(q)) return false;
    if (currentFilter === 'unread') return e.unread;
    if (currentFilter === 'attach') return e.hasAttach;
    if (currentFilter === 'today') return todayTimes.includes(e.time);
    if (currentFilter === 'aeon') return e.email.includes('aeonlao.com.la') || e.email.includes('aeoncredit.com.ph');
    if (currentFilter === 'external') return !e.email.includes('aeonlao.com.la') && !e.email.includes('aeoncredit.com.ph');
    return true;
  });
}

function renderList() {
  const filtered = getFiltered();
  const unread = filtered.filter(e => e.unread).length;
  const attach = filtered.filter(e => e.hasAttach).length;

  document.getElementById('stat-unread').textContent = emails.filter(e=>e.unread).length;
  document.getElementById('stat-total').textContent = emails.length;
  document.getElementById('stat-attach').textContent = emails.filter(e=>e.hasAttach).length;
  document.getElementById('nav-badge').textContent = emails.filter(e=>e.unread).length;

  const labels = { all:'Inbox', unread:'Unread', attach:'Attachments', today:'Today · 17 June', aeon:'AEON Team', external:'External' };
  document.getElementById('section-lbl').textContent = (labels[currentFilter] || 'Inbox') + ' · ' + filtered.length + ' email' + (filtered.length!==1?'s':'');

  const list = document.getElementById('email-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off"></i><p>No emails found</p></div>';
    return;
  }
  list.innerHTML = filtered.map(e => `
    <div class="email-item ${e.unread?'unread':'read'}" onclick="openEmail(${e.id})">
      <div class="avatar ${e.color}">${e.initials}</div>
      <div class="email-content">
        <div class="email-row1">
          <span class="sender-name">${e.sender}</span>
          <span class="email-time">${e.time}</span>
        </div>
        <div class="email-subject">${e.subject}</div>
        <div class="email-preview">${e.preview}</div>
        <div class="email-footer">
          ${e.unread ? '<span class="unread-pill">New</span>' : ''}
          ${e.hasAttach ? '<span class="attach-badge"><i class="ti ti-paperclip"></i> Attachment</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function openEmail(id) {
  currentEmail = emails.find(e => e.id === id);
  if (!currentEmail) return;
  currentEmail.unread = false;

  document.getElementById('detail-subject').textContent = currentEmail.subject;
  document.getElementById('detail-date').textContent = currentEmail.time + ' · ' + currentEmail.email;
  document.getElementById('detail-attach-info').textContent = currentEmail.hasAttach ? '📎 Has attachment' : '';

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-sender-card">
      <div class="avatar ${currentEmail.color}" style="width:48px;height:48px;font-size:16px;">${currentEmail.initials}</div>
      <div class="detail-sender-info">
        <div class="name">${currentEmail.sender}</div>
        <div class="email-addr">${currentEmail.email}</div>
      </div>
    </div>
    <div class="detail-text">${currentEmail.body}</div>
    ${currentEmail.hasAttach ? `<div class="attach-list"><div class="attach-item"><i class="ti ti-file-text"></i><span>Attachment (tap Open to view in Outlook)</span></div></div>` : ''}
  `;

  document.getElementById('detail-view').classList.add('open');
  renderList();
}

function closeDetail() {
  document.getElementById('detail-view').classList.remove('open');
  currentEmail = null;
}

function replyEmail() {
  if (!currentEmail) return;
  const subject = encodeURIComponent('Re: ' + currentEmail.subject);
  const to = encodeURIComponent(currentEmail.email);
  window.location.href = `mailto:${to}?subject=${subject}`;
}

function forwardEmail() {
  if (!currentEmail) return;
  const subject = encodeURIComponent('Fwd: ' + currentEmail.subject);
  window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(currentEmail.body)}`;
}

function openOutlook() {
  window.open('https://outlook.office365.com/mail/inbox', '_blank');
}

function showProfile() {
  alert('Account: somkhuanv@aeonlao.com.la\nOrganization: AEON Leasing Service (Lao) Co., Ltd.\nRole: IT System / System Maintenance Supervisor');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

renderList();
</script>
