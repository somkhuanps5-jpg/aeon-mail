<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AEON Mail" />

<title>AEON Mail – Inbox</title>
<style>
:root {
  --navy: #1a1a2e;
  --accent: #4f8ef7;
  --success: #34d399;
  --danger: #f87171;
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --border: rgba(0,0,0,0.10);
  --text: #1c1c1e;
  --text2: #6c6c70;
  --text3: #aeaeb2;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.12);
    --text: #fff;
    --text2: #aeaeb2;
    --text3: #636366;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg); overflow: hidden; }

/* Header */
.header { background: var(--navy); padding-top: var(--safe-top); flex-shrink: 0; }
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 4px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
.header-main { padding: 4px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.header-main h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.header-actions { display: flex; gap: 18px; }
.header-actions button { background: none; border: none; color: rgba(255,255,255,0.85); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; }
.account-badge { margin: 6px 20px 0; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; }
.account-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.account-badge span { font-size: 12px; color: rgba(255,255,255,0.75); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 16px 16px; background: var(--navy); }
.stat { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 10px; text-align: center; }
.stat .num { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }
.stat .num.blue { color: #60a5fa; }
.stat .num.green { color: var(--success); }
.stat .lbl { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; }

/* Search */
.search-wrap { padding: 10px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.search-inner { background: var(--surface2); border-radius: 12px; padding: 9px 14px; display: flex; align-items: center; gap: 8px; }
.search-inner input { flex: 1; border: none; background: transparent; font-size: 16px; color: var(--text); outline: none; }
.search-inner input::placeholder { color: var(--text3); }

/* Filters */
.filters { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.filters::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
.filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

/* Section label */
.section-lbl { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text2); background: var(--surface2); border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }

/* Email list */
.email-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--surface); }

/* Email item */
.email-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; position: relative; }
.email-item:active { background: var(--surface2); }
.email-item.unread { background: var(--surface); }
.email-item.read { background: var(--surface2); }
.email-item.unread::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }

/* Avatar */
.avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
.av-blue   { background: #dbeafe; color: #1e40af; }
.av-green  { background: #d1fae5; color: #065f46; }
.av-amber  { background: #fef3c7; color: #92400e; }
.av-purple { background: #ede9fe; color: #5b21b6; }
.av-coral  { background: #fee2e2; color: #991b1b; }
.av-teal   { background: #ccfbf1; color: #115e59; }
@media (prefers-color-scheme: dark) {
  .av-blue   { background: #1e3a5f; color: #93c5fd; }
  .av-green  { background: #064e3b; color: #6ee7b7; }
  .av-amber  { background: #451a03; color: #fcd34d; }
  .av-purple { background: #3b0764; color: #c4b5fd; }
  .av-coral  { background: #450a0a; color: #fca5a5; }
  .av-teal   { background: #042f2e; color: #5eead4; }
}

/* Email content */
.email-content { flex: 1; min-width: 0; }
.email-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.sender-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px; }
.email-item.read .sender-name { font-weight: 400; color: var(--text2); }
.email-time { font-size: 12px; color: var(--text3); flex-shrink: 0; padding-left: 8px; }
.email-subject { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.email-item.read .email-subject { font-weight: 400; color: var(--text2); }
.email-preview { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-footer { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.unread-pill { background: var(--accent); color: white; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.attach-badge { font-size: 11px; color: var(--text3); }

/* Empty */
.empty-state { padding: 60px 20px; text-align: center; color: var(--text3); font-size: 15px; }

/* Bottom nav */
.bottom-nav { background: var(--surface); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: max(10px, var(--safe-bottom)); flex-shrink: 0; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 12px; position: relative; }
.nav-item svg { width: 24px; height: 24px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.nav-item.active svg { stroke: var(--navy); }
.nav-label { font-size: 10px; color: var(--text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(--navy); font-weight: 600; }
.nav-badge { position: absolute; top: -4px; right: 4px; background: var(--danger); color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--surface); }

/* FAB */
.fab { position: fixed; bottom: calc(80px + var(--safe-bottom)); right: 20px; width: 52px; height: 52px; background: var(--navy); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; z-index: 10; }
.fab svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Detail view */
.detail-view { position: fixed; inset: 0; background: var(--surface); z-index: 100; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
.detail-view.open { transform: translateX(0); }
.detail-header { background: var(--navy); padding-top: var(--safe-top); padding-bottom: 12px; flex-shrink: 0; }
.detail-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; }
.detail-nav button { background: none; border: none; color: rgba(255,255,255,0.85); cursor: pointer; padding: 6px; display: flex; align-items: center; gap: 4px; font-size: 16px; color: white; }
.detail-nav svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.detail-subject { padding: 10px 16px 0; font-size: 17px; font-weight: 600; color: #fff; line-height: 1.3; }
.detail-meta { padding: 6px 16px; font-size: 12px; color: rgba(255,255,255,0.6); }
.detail-body { flex: 1; overflow-y: auto; padding: 20px 16px; }
.detail-sender-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface2); border-radius: 14px; margin-bottom: 16px; }
.detail-sender-info .name { font-size: 15px; font-weight: 600; color: var(--text); }
.detail-sender-info .addr { font-size: 13px; color: var(--text2); }
.detail-text { font-size: 15px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }
.detail-actions { display: flex; gap: 10px; padding: 12px 16px; border-top: 0.5px solid var(--border); background: var(--surface); padding-bottom: max(12px, var(--safe-bottom)); flex-shrink: 0; }
.action-btn { flex: 1; padding: 13px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface2); font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; }
.action-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
</style>
</head>

var todaySet = {"9:50 AM":1,"9:35 AM":1,"9:08 AM":1,"7:55 AM":1,"7:50 AM":1,"6:26 AM":1,"4:53 AM":1,"4:40 AM":1,"4:20 AM":1};
var currentFilter = 'all';
var currentEmail = null;

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 30000);

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function toggleSearch() {
  var wrap = document.getElementById('search-wrap');
  var hidden = wrap.style.display === 'none';
  wrap.style.display = hidden ? 'block' : 'none';
  if (hidden) document.getElementById('search-input').focus();
  else { document.getElementById('search-input').value = ''; renderList(); }
}

function getFiltered() {
  var q = (document.getElementById('search-input') ? document.getElementById('search-input').value : '').toLowerCase();
  return emails.filter(function(e) {
    if (q && e.sender.toLowerCase().indexOf(q) < 0 && e.subject.toLowerCase().indexOf(q) < 0 && e.preview.toLowerCase().indexOf(q) < 0) return false;
    if (currentFilter === 'unread') return e.unread;
    if (currentFilter === 'attach') return e.hasAttach;
    if (currentFilter === 'today') return !!todaySet[e.time];
    if (currentFilter === 'aeon') return e.email.indexOf('aeonlao.com.la') >= 0 || e.email.indexOf('aeoncredit.com.ph') >= 0;
    if (currentFilter === 'external') return e.email.indexOf('aeonlao.com.la') < 0 && e.email.indexOf('aeoncredit.com.ph') < 0;
    return true;
  });
}

function renderList() {
  var unreadCount = emails.filter(function(e){ return e.unread; }).length;
  document.getElementById('stat-unread').textContent = unreadCount;
  document.getElementById('stat-total').textContent = emails.length;
  document.getElementById('stat-attach').textContent = emails.filter(function(e){ return e.hasAttach; }).length;
  document.getElementById('nav-badge').textContent = unreadCount;

  var filtered = getFiltered();
  var labels = {all:'Inbox',unread:'Unread',attach:'Attachments',today:'Today · 17 June',aeon:'AEON Team',external:'External'};
  document.getElementById('section-lbl').textContent = (labels[currentFilter]||'Inbox') + ' · ' + filtered.length + ' email' + (filtered.length!==1?'s':'');

  var list = document.getElementById('email-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">📭<br><br>No emails found</div>';
    return;
  }
  list.innerHTML = filtered.map(function(e) {
    return '<div class="email-item ' + (e.unread?'unread':'read') + '" onclick="openEmail(' + e.id + ')">' +
      '<div class="avatar ' + e.color + '">' + e.initials + '</div>' +
      '<div class="email-content">' +
        '<div class="email-row1"><span class="sender-name">' + e.sender + '</span><span class="email-time">' + e.time + '</span></div>' +
        '<div class="email-subject">' + e.subject + '</div>' +
        '<div class="email-preview">' + e.preview + '</div>' +
        '<div class="email-footer">' +
          (e.unread ? '<span class="unread-pill">New</span>' : '') +
          (e.hasAttach ? '<span class="attach-badge">📎 Attachment</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openEmail(id) {
  currentEmail = null;
  for (var i=0; i<emails.length; i++) { if (emails[i].id === id) { currentEmail = emails[i]; break; } }
  if (!currentEmail) return;
  currentEmail.unread = false;
  document.getElementById('detail-subject').textContent = currentEmail.subject;
  document.getElementById('detail-meta').textContent = currentEmail.time + '  ·  ' + currentEmail.email + (currentEmail.hasAttach ? '  ·  📎' : '');
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-sender-card">' +
      '<div class="avatar ' + currentEmail.color + '" style="width:48px;height:48px;font-size:16px;">' + currentEmail.initials + '</div>' +
      '<div class="detail-sender-info"><div class="name">' + currentEmail.sender + '</div><div class="addr">' + currentEmail.email + '</div></div>' +
    '</div>' +
    '<div class="detail-text">' + currentEmail.body + '</div>' +
    (currentEmail.hasAttach ? '<div style="margin-top:16px;padding:12px;background:var(--surface2);border-radius:12px;">📎 This email has an attachment — open in Outlook to view.</div>' : '');
  document.getElementById('detail-view').classList.add('open');
  renderList();
}

function closeDetail() { document.getElementById('detail-view').classList.remove('open'); }
function deleteEmail() { if (currentEmail) { emails = emails.filter(function(e){ return e.id !== currentEmail.id; }); closeDetail(); renderList(); } }
function archiveEmail() { closeDetail(); }
function replyEmail() { if (currentEmail) window.location.href = 'mailto:' + currentEmail.email + '?subject=Re: ' + encodeURIComponent(currentEmail.subject); }
function forwardEmail() { if (currentEmail) window.location.href = 'mailto:?subject=Fwd: ' + encodeURIComponent(currentEmail.subject) + '&body=' + encodeURIComponent(currentEmail.body); }
function openOutlook() { window.open('https://outlook.office365.com/mail/inbox', '_blank'); }
function showProfile() { alert('Account: somkhuanv@aeonlao.com.la\nOrganization: AEON Leasing Service (Lao) Co., Ltd.\nRole: IT System / System Maintenance Supervisor'); }

renderList();
</script>
